<aside class="sidebar">
  <div class="brand">
    <span class="brand-mark">SM</span>
    <div>
      <p class="brand-name">SuperMED</p>
      <p class="brand-subtitle">System zarządzania szpitalem i EDM</p>
    </div>
  </div>

  <nav class="nav">
    @for (item of visibleNavItems; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active">
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
